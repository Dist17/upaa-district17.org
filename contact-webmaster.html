<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - UPAA District 17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .section-header { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- NAVBAR -->
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-x-4">
                    <img src="logo.png" alt="UPAA District 17 Logo" class="w-16 h-16 object-contain">
                    <div>
                        <h1 class="text-2xl font-semibold text-[#003366]">UPAA District 17</h1>
                        <p class="text-xs text-slate-500">Upper Peninsula • Area 74</p>
                    </div>
                </div>
                <div class="flex gap-x-8 text-sm font-medium">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="index.html#about" class="nav-link">About AA</a>
                    <a href="index.html#meetings" class="nav-link">Meetings</a>
                    <a href="minutes.html" class="nav-link">Meeting Minutes</a>
                    <a href="contact.html" class="nav-link font-semibold text-[#003366]">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-6 py-16">
        <h1 class="section-header text-5xl font-bold text-[#003366] text-center mb-4">Contact the Webmaster</h1>
        <p class="text-center text-slate-600 mb-12">Send messages, flyers, announcements, or suggestions</p>

        <!-- Form using FormSubmit (Free & Simple) -->
        <form action="https://formsubmit.co/upaa.district17@gmail.com" method="POST" class="space-y-8 bg-white p-10 rounded-3xl shadow-lg" enctype="multipart/form-data">
            
            <div>
                <label class="block text-sm font-medium mb-2">Name or Group Name *</label>
                <input type="text" name="name" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Email Address *</label>
                <input type="email" name="email" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Telephone (optional)</label>
                <input type="tel" name="phone" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Upload Flyer or Announcement (jpg, png, docx, pdf)</label>
                <input type="file" name="attachment" accept=".jpg,.jpeg,.png,.docx,.pdf" 
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Message / Comments / Suggestions *</label>
                <textarea name="message" rows="6" required 
                          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]"></textarea>
            </div>

            <button type="submit" 
                    class="w-full bg-[#003366] hover:bg-[#002244] text-white font-semibold py-4 rounded-2xl transition">
                Send Message
            </button>

            <!-- Hidden fields -->
            <input type="hidden" name="_subject" value="New Contact Form Submission - District 17">
            <input type="hidden" name="_next" value="https://dist17.github.io/upaa-district17.org/contact.html?success=1">
        </form>
    </div>

</body>
</html>

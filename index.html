<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPAA District 17 | Alcoholics Anonymous</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        
        .hero-bg {
            background: linear-gradient(180deg, #001a33 0%, #000d1a 100%);
            position: relative;
            overflow: hidden;
        }
        
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .nav-link { position: relative; }
        .nav-link:after {
            content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0;
            background-color: #003366;
        }
        .nav-link:hover:after { width: 100%; }
        
        .section-header { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- NAVBAR -->
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-x-4">
                    <img src="https://i.imgur.com/0vO5v9k.png" alt="UPAA District 17 Logo" class="w-16 h-16 object-contain">
                    <div>
                        <h1 class="text-2xl font-semibold text-[#003366]">UPAA District 17</h1>
                        <p class="text-xs text-slate-500">Upper Peninsula • Area 74</p>
                    </div>
                </div>

                <div class="flex gap-x-8 text-sm font-medium">
                    <a href="#home" class="nav-link">Home</a>
                    <a href="#about" class="nav-link">About AA</a>
                    <a href="#meetings" class="nav-link">Meetings</a>
                    <a href="minutes.html" class="nav-link">Meeting Minutes</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header id="home" class="hero-bg h-screen flex items-center relative">
        <div id="stars-container" class="stars"></div>
        <div class="max-w-7xl mx-auto px-6 text-center relative z-10">
            <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tighter">UPAA DISTRICT 17</h1>
            <p class="text-2xl text-white/90 mt-4">Alcoholics Anonymous • Upper Peninsula of Michigan</p>
            <p class="mt-6 text-white/90 text-xl">
                24/7 AA Helpline: <a href="tel:906-774-0900" class="underline font-semibold">906-774-0900</a>
            </p>
        </div>
    </header>

    <!-- Quick Link to Minutes -->
    <div class="py-8 bg-white text-center">
        <a href="minutes.html" class="inline-block bg-[#003366] text-white px-10 py-4 rounded-2xl text-lg font-medium hover:bg-[#002244]">
            View April 2026 Meeting Minutes →
        </a>
    </div>

    <script>
        function createStars() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2.5 + 1 + 'px';
                star.style.height = star.style.width;
                container.appendChild(star);
            }
        }
        window.onload = createStars;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPAA District 17 | Alcoholics Anonymous</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .hero-bg {
            background: linear-gradient(180deg, #001a33 0%, #000d1a 100%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s ease-in-out infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- HERO -->
    <header class="hero-bg flex items-center text-white text-center relative">
        <div id="stars-container" class="stars"></div>
        
        <div class="max-w-4xl mx-auto px-6 relative z-10 py-16">
            <img src="logo.png" alt="UPAA District 17 Logo" class="w-48 h-48 mx-auto mb-8 object-contain">
            
            <h1 class="text-6xl md:text-7xl font-bold mb-6 tracking-tight">UPAA DISTRICT 17</h1>
            <p class="text-2xl md:text-3xl mb-12">Alcoholics Anonymous • Upper Peninsula of Michigan</p>
            
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 max-w-3xl mx-auto mb-16">
                <a href="meetings.html" class="bg-white text-[#003366] py-4 px-6 rounded-2xl font-semibold hover:bg-slate-100">
                    Meetings
                </a>
                <a href="minutes.html" class="bg-white text-[#003366] py-4 px-6 rounded-2xl font-semibold hover:bg-slate-100">
                    Minutes
                </a>
                <a href="events.html" class="bg-white text-[#003366] py-4 px-6 rounded-2xl font-semibold hover:bg-slate-100">
                    AA Events
                </a>
                <a href="contact.html" class="bg-white text-[#003366] py-4 px-6 rounded-2xl font-semibold hover:bg-slate-100">
                    Contact
                </a>
                <a href="tel:906-774-0900" class="bg-[#003366] border-2 border-white text-white py-4 px-6 rounded-2xl font-semibold hover:bg-[#002244]">
                    906-774-0900
                </a>
            </div>

            <!-- Useful AA Links -->
            <div class="border-t border-white/30 pt-10">
                <p class="text-white/80 mb-6 text-lg">Other Helpful AA Resources</p>
                <div class="flex flex-wrap justify-center gap-x-8 gap-y-3 text-sm">
                    <a href="https://area74.org/" target="_blank" class="hover:underline">Area 74</a>
                    <a href="https://www.aa.org/aa-gso" target="_blank" class="hover:underline">AA GSO</a>
                    <a href="https://www.aagrapevine.org/" target="_blank" class="hover:underline">AA Grapevine</a>
                </div>
            </div>
        </div>
    </header>

    <script>
        function createStars() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(star);
            }
        }
        window.onload = createStars;
    </script>

</body>
</html>

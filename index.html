<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPAA District 17 | Alcoholics Anonymous</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .hero { background: linear-gradient(#001a33, #000d1a); color: white; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="bg-white shadow p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🔷</span>
                <div>
                    <h1 class="text-2xl font-bold text-[#003366]">UPAA District 17</h1>
                    <p class="text-sm text-slate-500">Upper Peninsula • Area 74</p>
                </div>
            </div>
            <div class="flex gap-6">
                <a href="#meetings" class="font-medium">Meetings</a>
                <a href="minutes.html" class="font-medium">Minutes</a>
                <a href="#contact" class="font-medium">Contact</a>
            </div>
        </div>
    </nav>

    <header class="hero py-32 text-center">
        <h1 class="text-5xl font-bold mb-4">UPAA DISTRICT 17</h1>
        <p class="text-2xl mb-6">Alcoholics Anonymous</p>
        <p class="text-xl">24/7 Helpline: <a href="tel:906-774-0900" class="underline">906-774-0900</a></p>
    </header>

    <section id="meetings" class="py-16 bg-white">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold mb-8">Meeting Schedule</h2>
            <p class="text-lg">Full meeting list coming soon...</p>
            <p class="mt-8">
                <a href="minutes.html" class="text-blue-600 underline">View April 2026 Minutes →</a>
            </p>
        </div>
    </section>

    <section id="contact" class="py-20 bg-slate-900 text-white text-center">
        <h2 class="text-4xl font-bold mb-4">Contact the Webmaster</h2>
        <p class="mb-8">upaa.district17@gmail.com</p>
        <form action="https://formsubmit.co/upaa.district17@gmail.com" method="POST" class="max-w-lg mx-auto px-6 space-y-4">
            <input type="text" name="name" placeholder="Your Name" required class="w-full p-4 rounded">
            <input type="email" name="email" placeholder="Your Email" required class="w-full p-4 rounded">
            <textarea name="message" placeholder="Message or flyer info" rows="5" required class="w-full p-4 rounded"></textarea>
            <button type="submit" class="w-full bg-white text-slate-900 py-4 rounded font-medium">Send Message</button>
        </form>
    </section>

</body>
</html>

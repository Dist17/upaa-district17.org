<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact the Webmaster - UPAA District 17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .section-header { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- Navbar (same as your main site) -->
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-x-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="92" fill="none" stroke="#003366" stroke-width="18"/>
                        <polygon points="100,38 165,145 35,145" fill="none" stroke="#003366" stroke-width="14" stroke-linejoin="round"/>
                        <text x="100" y="118" text-anchor="middle" fill="#003366" font-size="58" font-family="Arial Black" font-weight="900" letter-spacing="-4">AA</text>
                    </svg>
                    <div>
                        <h1 class="text-2xl font-semibold text-[#003366]">UPAA District 17</h1>
                    </div>
                </div>
                <div class="flex gap-x-8 text-sm font-medium">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="index.html#about" class="nav-link">About</a>
                    <a href="index.html#meetings" class="nav-link">Meetings</a>
                    <a href="contact.html" class="nav-link font-semibold text-[#003366]">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-6 py-16">
        <h1 class="section-header text-5xl font-bold text-[#003366] text-center mb-4">Contact the Webmaster</h1>
        <p class="text-center text-slate-600 mb-12">Your message will help improve this website for District 17</p>

        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-8 bg-white p-10 rounded-3xl shadow-lg">
            
            <div>
                <label class="block text-sm font-medium mb-2">Name or Group Name</label>
                <input type="text" name="name" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Telephone (optional)</label>
                <input type="tel" name="phone" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Add a File for an Event (jpg, gif, docx, pdf)</label>
                <input type="file" name="attachment" accept=".jpg,.jpeg,.gif,.docx,.pdf" 
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]">
                <p class="text-xs text-slate-500 mt-1">Maximum 10MB</p>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Comments or Suggestions</label>
                <textarea name="message" rows="6" required 
                          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#003366]"></textarea>
            </div>

            <button type="submit"
                    class="w-full bg-[#003366] text-white font-semibold py-4 rounded-2xl hover:bg-[#002244] transition">
                Send Message
            </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-8">
            Thank you for helping keep District 17 information accurate and useful.
        </p>
    </div>

</body>
</html>
